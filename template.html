<!-- Carousel component root wrapper -->
<div class="carousel">
    <!-- The visible "window" for the carousel, only one slide shows at a time -->
    <div class="carousel__frame frame">
        <!-- The tape ("track") that slides all slides side-to-side via CSS transform -->
        <div class="carousel__tape tape">
            <!-- Carousel slides (images). Add as many as needed. -->
            <img src="imageX.jpg" alt="Short, descriptive text for screen readers"
                aria-label="(Optional) More detailed description for accessibility" class="carousel__img">
            <img src="imageY.jpg" alt="Short, descriptive text for screen readers"
                aria-label="(Optional) More detailed description for accessibility" class="carousel__img">
            <img src="imageZ.jpg" alt="Short, descriptive text for screen readers"
                aria-label="(Optional) More detailed description for accessibility" class="carousel__img">
            <!-- ... -->
        </div>
    </div>
    <!-- Navigation controls: previous/next arrows & play/pause button -->
    <div class="carousel__controls">
        <button class="carousel__prev previous-btn" aria-label="Previous slide">
            &lt;
        </button>
        <button class="carousel__next next-btn" aria-label="Next slide">
            &gt;
        </button>
        <button class="carousel__play-pause play-btn" aria-label="Play or pause slideshow">
            <!-- Icon populated dynamically by JS -->
        </button>
    </div>
    <!-- Dot navigation (will be filled dynamically by JS) -->
    <div class="carousel__dots dots-box">
        <!-- Dots generated by script -->
    </div>
</div>
